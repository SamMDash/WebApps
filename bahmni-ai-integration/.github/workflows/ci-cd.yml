# GitHub Actions workflow for Bahmni AI Integration
name: CI/CD for Bahmni AI Integration

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Build backend Docker image
        run: |
          cd bahmni-ai-integration/backend
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/bahmni-ai-integration-backend:latest .
      - name: Push backend Docker image
        run: |
          echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bahmni-ai-integration-backend:latest

  build-and-push-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Build frontend Docker image
        run: |
          cd bahmni-ai-integration/frontend
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/bahmni-ai-integration-frontend:latest .
      - name: Push frontend Docker image
        run: |
          echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bahmni-ai-integration-frontend:latest
