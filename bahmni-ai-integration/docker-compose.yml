# docker-compose.yml for Bahmni AI Integration
version: '3.8'
services:
  bahmni-ai-integration-backend:
    build: ./backend
    container_name: bahmni-ai-integration-backend
    environment:
      - OPENMRS_BASE_URL=http://bahmni-standard-openmrs-1:8080/openmrs/ws/rest/v1
      - AI_SERVICE_URL=http://ai-microservice:8000/clinical-analysis
    ports:
      - "3001:3001"
    networks:
      - bahmni-net

  bahmni-ai-integration-frontend:
    build: ./frontend
    container_name: bahmni-ai-integration-frontend
    ports:
      - "8082:80"
    networks:
      - bahmni-net
    depends_on:
      - bahmni-ai-integration-backend
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf

networks:
  bahmni-net:
    external: true
